markets:
  primary: "NBA"
  types:
    - "player_points_over"
    - "player_assists_over"
    - "player_rebounds_over"

model:
  random_seed: 42
  kelly_fraction: 0.25
  min_edge: 0.03
  max_legs_per_parlay: 4
  max_parlays_per_slate: 3
  max_stake_pct: 0.04
  max_parlay_pct: 0.02
  max_slate_exposure: 0.15
  min_p_hit: 0.55
  min_leg_odds_american: -250
  max_leg_odds_american: 250
  correlation_max_pair: 0.4
  correlation_default_pair: 0.0
  correlation_discount_default: 1.0
  worthy_requires_positive_ev: true

features:
  season_games: 82
  rolling_windows: [3, 5, 10]
  ewm_span: 5

training:
  optuna_trials: 50
  lgbm_n_estimators: 500
  lgbm_learning_rate: 0.03
  retrain_frequency_days: 30
  calibration:
    ece_threshold: 0.05
    ece_test_max: 0.10
    primary_method: "isotonic"
    fallback_method: "sigmoid"
    calibration_plot_bins: 10

backtest:
  walk_forward_weeks: 4
  min_sample_parlays: 200
  baseline_compare: true

data:
  odds_api_key: "${ODDS_API_KEY}"
  stats_api_key: "${STATS_API_KEY}"
  raw_data_path: "betting_system/data/raw/"
  processed_data_path: "betting_system/data/processed/"
  odds_history_path: "betting_system/data/odds_history/"
  models_path: "betting_system/models/"
  db_url: "sqlite:///betting_system/data/betting_system.sqlite"

api:
  host: "127.0.0.1"
  port: 8000

dashboard:
  port: 8501
  default_bankroll: 50.0
  leg_count_options: [5, 10, 15]
  multiplier_targets: [10, 15]
  multiplier_tolerance_pct: 0.30
  max_pool_legs: 22
  use_demo_when_empty: true
  default_objective_mode: balanced

odds:
  bookmakers: "draftkings,fanduel,williamhill_us"
  regions: "us"

stats:
  season: "2024-25"
  cache_enabled: true

mapping:
  fuzzy_threshold: 0.85
  min_join_rate: 0.30

recommendations:
  prob_weight: 0.4
  ev_weight: 0.35
  correlation_penalty_weight: 0.15
  target_multiplier_weight: 0.1

sequence:
  enabled: false
  seq_len: 10
  embedding_dim: 4
  epochs: 15

prediction_markets:
  enabled: true
  sources:
    polymarket:
      enabled: true
      base_url: "https://gamma-api.polymarket.com"
      limit: 80
      order: "volume_num"
      ascending: false
    kalshi:
      enabled: true
      base_url: "https://api.elections.kalshi.com/trade-api/v2"
      limit: 80
      status: "open"
  categories:
    - Politics
    - Sports
    - Crypto
    - Econ
    - Culture
  curation:
    min_volume_usd: 10000
    max_opportunities: 8
    max_per_category: 2
    min_question_length: 12
    max_days_to_close: 365
  scoring:
    min_edge_pct: 2.0
    momentum_weight: 0.35
    liquidity_weight: 0.25
    category_prior_weight: 0.15
    confidence_floor: 0.52
  ui:
    default_category: "All"
    default_sort: "edge"
    hero_pick_count: 1
    feed_count: 8
    starting_equity: 24847.32
    daily_edge_captured: 342.18
  fixture_fallback: true
