name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MPLCONFIGDIR: ${{ runner.temp }}/matplotlib
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Validate config
        run: python -m dk_picks.cli validate-config --path betting_system/config.yaml

      - name: Focused smoke tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: make smoke

      - name: Pytest with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -v --cov=. --cov-report=term-missing --cov-fail-under=80
